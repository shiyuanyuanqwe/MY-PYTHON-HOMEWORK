<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定位</title>
    <style>
        .box1{
            height: 350px;
            background-color: aqua;
        }
        .box-normal{
            height: 100px;
            width: 100px;
            background-color: purple;
        }
        .box-relative{
            width: 100px;
            height: 100px;
            background-color: pink;
            position: relative;
            /* left;  指离原本位置最左边偏离的距离*/ 
            /* right: 指离原本位置最右边偏离的距离; */
            /* top:   指离原本位置最顶部偏离的距离 ; */
            /* bottom:指离原本位置最底部偏离的距离 ; */
            left: 20px;
            /* 向右移20px */
            top: 20px;
            /* 向下移20px */
        }
        .box2{
            height: 350px;
            background-color: yellow;
            margin-bottom: 300px;
        }
        .box-absolute{
            height: 100px;
            width: 100px;
            background-color: yellowgreen;
            position: absolute;
            left: 120px;
        }
        .box-fixed{
            height: 100px;
            width: 100px;
            background-color: brown;
            position: fixed;
            right: 0;
            top: 300px;
        }
    </style>
</head>
<body>
    <h1>相对定位</h1>
    <div class="box1">
        <div class="box-normal"></div>
        <div class="box-relative"></div>
        <div class="box-normal"></div>    
    </div>
    <h1>绝对定位</h1>
    <div class="box2">
        <div class="box-normal"></div>
        <div class="box-absolute"></div>
        <div class="box-normal"></div>    
    </div>
    <h1>固定定位</h1>
    <div class="box-fixed"></div>
</body>
</html>
