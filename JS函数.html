<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS函数</title>
</head>
<body>
    <script>
        function hello(){
            console.log("Hello, World!");
        }
        hello(); // 调用函数

        function hello_with_return(){
            return 'Hello,World!-返回值-'
        }
        hello_with_return
        let a =hello_with_return();
        console.log(a);
        console.log(hello_with_return());
        
        function hello_world_with_params(name){
            console.log('hello,', name);
        }
        hello_world_with_params("哈基米");
        hello_world_with_params("哈基米");
        hello_world_with_params("哈基米");

        // 作用域-全局作用域-局部作用域
        let global_var = '全局变量';
        function local_var_function(){
            let local_var = '局部变量';
            console.log('函数内打印全局变量：' + global_var);
            console.log('函数内打印局部变量：' + local_var);

            
        }
        local_var_function();
        console.log('全局打印全局变量：' + global_var);
        console.log('全局打印局部变量：' + local_var);
    </script>
    
</body>
</html>
