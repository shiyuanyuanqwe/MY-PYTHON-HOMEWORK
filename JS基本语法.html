<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS基本语法</title>
</head>
<body>
    
    <script>
        var x ;
        // 现代JavaScript中，建议使用let和const来声明变量
        let y = 5 ;
        const PI = 3.14 ;
        console.log(x,y,PI)
        let name = "哈基米"
        console.log(name);
        let empty_value = null ;
        console.log(empty_value);

        let age = 9 ;
        if(age > 18){
            console.log("你已经成年了");
        } else {
            console.log("你还未成年");
        }
        // let time = 19 ;
        // if (time < 12){
        //     alert("上午好");
        // } else if( time < 18){
        //     alert("下午好");
        // } else {
        //     alert("晚上好");
        // }

        console.log("FOR 循环");
        for(let i = 1; i < 11;i++){
            console.log(i);
            
        }
        console.log("WHILE 循环");
        let count = 1;
        while(count <= 10){
            console.log(count);
            count++
        }

        console.log("循环关键字");
        
        for(var i = 0; i < 7; i++){
            if(i == 2){
                continue; // 跳过当前循环的剩余部分，直接进入下一次循环
            }
            if(i == 5){
                break; // 跳出当前循环
            }
            console.log(i);
            
        }
        
        

        
        
    </script>
</body>
</html>
