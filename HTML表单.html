<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML表单</title>
</head>
<body>
    <form action="" >
        <label for="username">用户名：</label>
        <input type="text" id="username" placeholder="请输入用户名"><br><br>
        <label for="password">密码：</label>
        <input type="password" placeholder="请输入密码" id="password"><br><br>

        <label>性别</label>
        <input type="radio" name="gender">男
        <input type="radio" name="gender">女
        <input type="radio" name="gender">非二元性别<br><br>


        <label>爱好：</label>
        <input type="checkbox" name="hobby">唱
        <input type="checkbox" name="hobby">跳
        <input type="checkbox" name="hobby">rap
        <input type="checkbox" name="hobby">篮球
        <input type="checkbox" name="hobby">music <BR></BR>

        <input type="submit" value="立即启动原神！😋">




    </form>
    
</body>
</html>
