<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS盒子模型</title>
    <style>
        .demo{
            background-color: aqua;
            display: inline-block;
            border: 5px solid yellowgreen;
             /*实线 solid 虚线 dashed 点线dotted 双实线double  */
             padding: 50px;
             margin: 40px;
        }
        .border-demo{
            background-color: yellow;
            width: 300px;
            height: 200px;
            border-style: solid ;
            border-width: 0 10px 0 10px;
            border-left: 10px solid blueviolet;
            border-right-color:brown
        }
    </style>
</head>
<body>
    <div class="demo">B站搜索哈基米</div>
    <div class="border-demo">这是一个边框示例</div>
</body>
</html>
