<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS选择器</title>

    <style>
        /* 这是一个元素选择器喵 */
        h2{
            color: aqua;
        }
        /* 这是一个类选择器喵 */
        .highlight{
            background-color: yellow;
        }
        /* 这是一个id选择器喵 */
        #header{
            font-size: 37px;
        }
        /* 这是一个通用选择器喵 */
        *{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-weight: bolder;
        }
        /* 这是一个子元素选择器喵 */
        .father > .son{
            color: yellowgreen;
        }
        /* 这是一个后代选择器喵 */
        .father p{
            color: brown;
            font-size: larger;
        }
        /* 这是一个相邻元素选择器喵 */
        h3 + p{
            background-color: red;
        }
        /* 这是一个伪类选择器喵 */
        #element:hover{
            background-color: blueviolet;
        }
        /* 
        选中第一个子元素:first-child
                     :nth-child()
                     :active
         */
        /* 这是一个伪元素选择器喵
        ::after
        ::before */


    </style>
</head>
<body>
    <h1>不同类型的CSS选择器</h1>
    <h2>这是一个元素选择器示例</h2>
    <h3 class="highlight">这是一个类选择器示例</h3>
    <h3>这是另一个类选择器示例</h3>
    <h4 id="header">这是一个id选择器示例</h4>

    <div class="father">
        <p class="son">这是一个子元素选择器示例</p>
        <div>
            <p class="grandson">这是一个后代选择器示例</p>
        </div>
    </div>

    <p>这是一个普通的p标签</p>
    <h3>这是一个相邻兄弟选择器示例</h3>
    <p>这是另一个p标签</p>

    <h3 id="element">这是一个伪类选择器示例</h3>
</body>
</html>
